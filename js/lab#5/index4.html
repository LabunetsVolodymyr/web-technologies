<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Магазин - Повна версія</title>
    <link rel="stylesheet" href="style4.css">
</head>
<body>
<div class="shop-container">
    <h2>Управління магазином</h2>

    <div class="form-group">
        <input type="text" id="pName" placeholder="Назва продукту">
        <input type="number" id="pPrice" placeholder="Ціна">
        <input type="number" id="pStock" placeholder="Кількість">
        <button onclick="uiAddProduct()">Додати/Оновити продукт</button>
    </div>

    <div class="form-group">
        <input type="text" id="searchName" placeholder="Пошук за назвою..." oninput="uiSearch()">
    </div>

    <hr>
    <h3>Каталог</h3>
    <div id="catalogList"></div>

    <h3>Журнал замовлень (ID)</h3>
    <div id="orderLog"></div>
</div>
<script src="script4.js"></script>
</body>
</html>
